name: True Press - Coleta e Processamento Horario

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  collect-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Coletar RSS + Processar via Groq
        run: |
          BASE="https://sfnvctljxidzueoutnxv.supabase.co/functions/v1/gemini-proxy"
          AUTH="Bearer ${{ secrets.SUPABASE_ANON_KEY }}"

          echo "=== COLETA RSS $(date) ==="
          COLLECT=$(curl -s -X POST "$BASE" \
            -H "Content-Type: application/json" \
            -H "Authorization: $AUTH" \
            -d '{"action":"collect_rss"}')
          echo "$COLLECT"

          sleep 5

          echo "=== PROCESSAMENTO ==="
          for i in 1 2 3; do
            echo "Lote $i"
            RESULT=$(curl -s -X POST "$BASE" \
              -H "Content-Type: application/json" \
              -H "Authorization: $AUTH" \
              -d '{"action":"process_queue","batch_size":10}')
            echo "$RESULT"
            PROCESSED=$(echo "$RESULT" | grep -o '"processed":[0-9]*' | grep -o '[0-9]*')
            [ "$PROCESSED" = "0" ] || [ -z "$PROCESSED" ] && break
            sleep 5
          done

          echo "=== CONCLUIDO $(date) ==="
